# Research and internship experiences.
# Consumed by both src/data/experiences.ts (website) and public/assets/liyang.typ (CV).
#
# Fields:
#   institution   — full institution name (also the display title on CV)
#   institution_url — (optional) link to institution/lab
#   group         — research group / sub-unit (shown on both)
#   role          — position title (e.g., Research Intern, Graduate Research Assistant)
#   location      — city, country
#   start         — start date (free-form string: "Mar 2025")
#   end           — end date ("Present" allowed)
#   summary       — (website) one-line description
#   details       — (CV) multi-line description as list; uses Markdown-ish *bold*
#   mentor        — (CV only) { name, url } list
#   image         — (website) small logo image for the tile
#   highlight     — (website) optional eyebrow tag (e.g., "Stars of Tomorrow")
#   on_web        — include on website (default true)
#   on_cv         — include on CV      (default true)

- institution: "Department of Computer Science, Rutgers University"
  role: "Graduate Research Assistant"
  location: "New Brunswick, NJ, US"
  start: "Aug 2025"
  end: "Present"
  details:
    - "*Parallel Reasoning for Large Language Models:* Conducting research on parallel and interactive reasoning mechanisms. We are developing frameworks that enable LLMs to perform concurrent reasoning with mutual communication, aiming to enhance both inference efficiency and accuracy."
  mentor:
    - { name: "Chengzhi Mao", url: "https://chengzhi-mao.github.io/" }
  on_web: false

